<!DOCTYPE html>
<html lang="id">

  function gtag(){dataLayer.push(arguments);}

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player</title>
<style>
body{margin:0;background:#000}
video{width:100%;height:100vh;object-fit:contain;background:#000}
#title{position:absolute;top:10px;left:10px;color:#fff;font-size:14px}
</style>
</head>

<body>

<video id="player" controls playsinline controlsList="nodownload">
  <source src="" type="video/mp4">
</video>

<script>
const JSON_URL = "videos.json";
const DIRECT_LINK = "https://omg10.com/4/10969708";

const video = document.getElementById("player");

let clicked = false;
let redirected = false;

// baca path dari hash atau pathname
const path = location.hash.slice(1) || location.pathname;

const id = decodeURIComponent(
  path.replace(/^\/+/, '')
);

fetch(JSON_URL)
.then(res => res.json())
.then(data => {

  const vids = data.videos;

  // cari video
  const selected = vids.find(v => v.id === id);

  // jika tidak ditemukan
  if (!selected) {
    document.body.innerHTML = "<h1 style='color:white'>Video tidak ditemukan</h1>";
    return;
  }

  video.src = selected.cdn;
});

// redirect klik pertama
video.addEventListener("click", () => {
  if (!clicked) {
    clicked = true;
    window.location.href = DIRECT_LINK;
  }
}, { once: true });

// redirect 30 detik
video.addEventListener("timeupdate", () => {
  if (!redirected && video.currentTime >= 30){
    redirected = true;
    window.location.href = DIRECT_LINK;
  }
});
</script>
</body>
</html>
